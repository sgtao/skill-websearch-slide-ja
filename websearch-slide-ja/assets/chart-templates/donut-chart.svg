<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" class="chart-svg">
  <!-- ============================================================
       DONUT CHART TEMPLATE — ドーナツグラフ
       
       基本パラメータ:
         中心:   cx=260, cy=180
         外半径: 110
         内半径: 60
         開始:   12 時方向（北）から時計回り
       
       角度→座標の変換（rad = (deg - 90) * π / 180）:
         外周点:  x = 260 + 110 * cos(rad)
                  y = 180 + 110 * sin(rad)
         内周点:  x = 260 + 60  * cos(rad)
                  y = 180 + 60  * sin(rad)
       
       SVG path d の書式（1 セクター）:
         M (start_outer_x) (start_outer_y)
         A 110 110 0 (large_arc) 1 (end_outer_x) (end_outer_y)
         L (end_inner_x)   (end_inner_y)
         A 60 60 0   (large_arc) 0 (start_inner_x) (start_inner_y)
         Z
       ※ large_arc: セクター角度 > 180° なら 1、そうでなければ 0
       
       使い方:
         1. {TITLE}, {SOURCE} を置換
         2. データ %（合計 100）を決め、各セクターの開始/終了角を算出
         3. 各セクターの 4 点を計算して path d に埋め込む
         4. 凡例にセクター名と % を入れる
         5. 中央テキスト（任意）に合計値・項目数などを入れる
       
       下のサンプルは 3 セクター（50% / 30% / 20%）の実値入りプリセット。
       実データに合わせて path を再計算すること。
       
       サンプル角度計算:
         セクター1: 0° → 180°   (50%)  large_arc=1
         セクター2: 180° → 288° (30%)  large_arc=0
         セクター3: 288° → 360° (20%)  large_arc=0
       ============================================================ -->

  <!-- グラフタイトル -->
  <text x="40" y="28" class="chart-title">{TITLE}</text>

  <!-- ─── ドーナツ本体（サンプル: 50%/30%/20%） ─── -->
  <!-- セクター 1（0°〜180°、50%） -->
  <path d="M 260 70
           A 110 110 0 1 1 260 290
           L 260 240
           A 60 60 0 1 0 260 120
           Z" class="chart-series-1" />

  <!-- セクター 2（180°〜288°、30%） -->
  <path d="M 260 290
           A 110 110 0 0 1 155.4 215.0
           L 203.0 197.3
           A 60 60 0 0 0 260 240
           Z" class="chart-series-2" />

  <!-- セクター 3（288°〜360°、20%） -->
  <path d="M 155.4 215.0
           A 110 110 0 0 1 260 70
           L 260 120
           A 60 60 0 0 0 203.0 197.3
           Z" class="chart-series-3" />

  <!-- ─── 中央テキスト（任意・合計・項目数など） ─── -->
  <text x="260" y="175" class="chart-label" text-anchor="middle">{CENTER_LABEL}</text>
  <text x="260" y="198" class="chart-value" text-anchor="middle" style="font-size: 18px;">{CENTER_VALUE}</text>

  <!-- ─── 凡例（右側） ─── -->
  <rect x="440" y="80"  width="14" height="14" class="chart-series-1" />
  <text x="462" y="92" class="chart-legend">{SERIES_1_NAME}</text>
  <text x="680" y="92" class="chart-value" text-anchor="end">{PCT_1}%</text>

  <rect x="440" y="110" width="14" height="14" class="chart-series-2" />
  <text x="462" y="122" class="chart-legend">{SERIES_2_NAME}</text>
  <text x="680" y="122" class="chart-value" text-anchor="end">{PCT_2}%</text>

  <rect x="440" y="140" width="14" height="14" class="chart-series-3" />
  <text x="462" y="152" class="chart-legend">{SERIES_3_NAME}</text>
  <text x="680" y="152" class="chart-value" text-anchor="end">{PCT_3}%</text>

  <!-- ─── 系列 4・5（必要時にコメント解除） ───
  <rect x="440" y="170" width="14" height="14" class="chart-series-4" />
  <text x="462" y="182" class="chart-legend">{SERIES_4_NAME}</text>
  <text x="680" y="182" class="chart-value" text-anchor="end">{PCT_4}%</text>

  <rect x="440" y="200" width="14" height="14" class="chart-series-5" />
  <text x="462" y="212" class="chart-legend">{SERIES_5_NAME}</text>
  <text x="680" y="212" class="chart-value" text-anchor="end">{PCT_5}%</text>
  -->

  <!-- 出典（必須・SVG 右下） -->
  <text x="680" y="350" class="chart-source" text-anchor="end">出典: {SOURCE}</text>
</svg>
